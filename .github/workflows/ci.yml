name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

  # Same platforms as release.yml. Native Ubuntu 24.04 builds (not Docker) so
  # Swatinem/rust-cache can reuse the release target between runs. Containerfile
  # remains for local podman/docker wheel builds.
  linux:
    name: Linux wheel (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(./scripts/next-calver.sh)"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using VERSION=$VERSION"
          chmod +x scripts/*.sh
          ./scripts/set-version.sh "$VERSION"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libssl-dev \
            patchelf \
            pkg-config \
            python3 \
            python3-pip

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheel-linux-${{ matrix.arch }}

      # Call maturin on the host (not maturin-action): the action injects its own
      # --compatibility and conflicts with manylinux_2_39. glibc 2.39 on
      # ubuntu-24.04 matches the Containerfile / PyPI tag.
      - name: Install maturin
        run: sudo python3 -m pip install --break-system-packages 'maturin[patchelf]>=1.0,<2.0'

      - name: Build wheel
        env:
          OPENSSL_NO_VENDOR: '1'
        run: |
          set -euo pipefail
          mkdir -p dist
          maturin build --release --locked --compatibility manylinux_2_39 -o dist
          ls -la dist

      - name: Build sdist
        if: matrix.arch == 'x86_64'
        run: maturin sdist -o dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: dist/*

  macos:
    name: macOS wheel (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(./scripts/next-calver.sh)"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          chmod +x scripts/*.sh
          ./scripts/set-version.sh "$VERSION"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheel-macos-aarch64

      # ort does not ship prebuilt ONNX Runtime for x86_64-apple-darwin.
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --locked --out dist
          manylinux: 'off'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist/*
