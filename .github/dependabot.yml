version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Wait a week after a crate is published before proposing the bump
    # (security updates are not delayed).
    cooldown:
      default-days: 7
    # One PR for routine bumps; Dependabot still opens separate PRs for
    # security updates when needed.
    groups:
      rust-dependencies:
        patterns:
          - "*"
