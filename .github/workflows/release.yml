name: Release

# Cut a release from the Actions UI (or `gh workflow run release.yml`).
# Version is CalVer YYYY.MMDD.N via scripts/next-calver.sh; a matching git tag
# is created after a successful PyPI publish so the next run increments N.
on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve next CalVer
        id: ver
        run: |
          set -euo pipefail
          git fetch --tags --force origin
          VERSION="$(./scripts/next-calver.sh)"
          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: invalid version from next-calver.sh: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using VERSION=$VERSION"

  linux:
    name: Linux wheel (${{ matrix.arch }})
    needs: [prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          ./scripts/set-version.sh "${{ needs.prepare.outputs.version }}"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libssl-dev \
            patchelf \
            pkg-config \
            python3 \
            python3-pip

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheel-linux-${{ matrix.arch }}

      # Host maturin + rust-cache (same as CI). Avoid maturin-action here: it
      # injects --compatibility and conflicts with manylinux_2_39.
      - name: Install maturin
        run: sudo python3 -m pip install --break-system-packages 'maturin[patchelf]>=1.0,<2.0'

      - name: Build wheel
        env:
          OPENSSL_NO_VENDOR: '1'
        run: |
          set -euo pipefail
          mkdir -p dist
          maturin build --release --locked --compatibility manylinux_2_39 -o dist
          ls -la dist

      - name: Build sdist
        if: matrix.arch == 'x86_64'
        run: maturin sdist -o dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: dist/*

  macos:
    name: macOS wheel (aarch64)
    needs: [prepare]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          ./scripts/set-version.sh "${{ needs.prepare.outputs.version }}"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheel-macos-aarch64

      # ort does not ship prebuilt ONNX Runtime for x86_64-apple-darwin.
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --locked --out dist
          manylinux: 'off'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: [prepare, linux, macos]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/context-server/
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
          merge-multiple: true

      - name: Show artifacts
        run: ls -la wheels

      # Trusted Publishing (OIDC). Configure at:
      # https://pypi.org/manage/project/context-server/settings/publishing/
      # Owner: context-server, Repo: context-server, Workflow: release.yml, Environment: release
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always -v wheels/*

      - name: Tag release
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags --force origin
          if git rev-parse "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "tag ${VERSION} already exists; leaving as-is"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "${VERSION}" "${GITHUB_SHA}"
          git push origin "refs/tags/${VERSION}"
          echo "Created tag ${VERSION} at ${GITHUB_SHA}"
