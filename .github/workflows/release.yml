name: Release

on:
  push:
    tags:
      # CalVer: YYYY.MMDD.N (e.g. 2026.716.1)
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux wheel (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(./scripts/next-calver.sh)"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using VERSION=$VERSION"

      # Same Containerfile as local `./scripts/build-wheel.sh` (podman/docker).
      # Ubuntu 24.04 base is required: ort prebuilts need glibc >= ~2.38.
      - name: Build wheel with Containerfile
        run: |
          set -euo pipefail
          docker build \
            --build-arg "VERSION=${{ steps.ver.outputs.version }}" \
            -t context-server-wheel \
            -f Containerfile .
          cid="$(docker create context-server-wheel)"
          mkdir -p dist
          docker cp "$cid:/out/." dist/
          docker rm "$cid"
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: dist/*

  macos:
    name: macOS wheel (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(./scripts/next-calver.sh)"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          chmod +x scripts/*.sh
          ./scripts/set-version.sh "$VERSION"

      # ort does not ship prebuilt ONNX Runtime for x86_64-apple-darwin.
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --locked --out dist
          manylinux: 'off'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: [linux, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: release
      url: https://pypi.org/project/context-server/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: astral-sh/setup-uv@v6

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
          merge-multiple: true

      - name: Show artifacts
        run: ls -la wheels

      # Trusted Publishing (OIDC). Configure at:
      # https://pypi.org/manage/project/context-server/settings/publishing/
      # Owner: shanemcd, Repo: context-server, Workflow: release.yml, Environment: release
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always -v wheels/*
